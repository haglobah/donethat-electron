<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.google.com https://*.gstatic.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      connect-src 'self' sentry-ipc: https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.cloudfunctions.net https://app.donethat.ai https://*.firebaseapp.com https://*.googleapis.com https://firebaseinstallations.googleapis.com https://o4511426462285824.ingest.de.sentry.io;
    " />
    <!-- Compiled Tailwind + custom styles (output.css is built from styles.css; do not load styles.css in browser or it will 404 on @import "tailwindcss") -->
    <link href="../build/output.css" rel="stylesheet" />
    <title>Chat</title>
    <style>
      html, body { height: 100%; overflow: hidden; }
      body { background: transparent; font-family: var(--dt-font-body); color: var(--dt-color-text-default); }
      .overlay-root { }
      /* When liquid glass is active, remove any window/content border */
      .liquid-glass-active html,
      .liquid-glass-active body,
      .liquid-glass-active .overlay-root,
      .liquid-glass-active .overlay-card { border: none !important; outline: none !important; }
      .no-drag { -webkit-app-region: no-drag; }
      /* Translucent so native liquid glass (behind web content) shows through; window move via IPC (see chat.js). */
      .overlay-card { cursor: grab; backdrop-filter: blur(12px); background: rgba(255,255,255,0.42); border: 1px solid rgba(229,231,235,0.88); border-radius: 12px; }
      .mascot-wrap { position: relative; flex-shrink: 0; width: 40px; min-width: 40px; height: 40px; border-radius: 999px; overflow: hidden; background: #fff; border: 1px solid rgba(229,231,235,0.92); }
      .mascot-canvas,
      .mascot-fallback { display: block; width: 100%; height: 100%; border-radius: inherit; }
      .mascot-canvas,
      .mascot-fallback,
      .mascot-fallback-mouth { background: #fff; }
      .mascot-canvas { filter: grayscale(1) brightness(1.35) contrast(1.8); }
      .mascot-fallback { position: absolute; inset: 0; }
      .mascot-fallback::before,
      .mascot-fallback::after { content: ''; position: absolute; top: 16px; width: 4px; height: 6px; border-radius: 999px; background: rgba(74, 33, 0, 0.9); }
      .mascot-fallback::before { left: 13px; }
      .mascot-fallback::after { right: 13px; }
      .mascot-fallback-mouth { position: absolute; left: 50%; bottom: 11px; width: 12px; height: 6px; transform: translateX(-50%); border-bottom: 2px solid rgba(74, 33, 0, 0.85); border-radius: 0 0 999px 999px; }
      .speech { position: absolute; right: 0; bottom: 60px; max-width: 220px; background: rgba(31,41,55,0.96); color: var(--dt-color-text-inverse); border: 1px solid rgba(75,85,99,0.4); border-radius: 8px; padding: 6px 8px; font-size: 11px; }
      .speech:after { content: ''; position: absolute; right: 10px; bottom: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid rgba(31,41,55,0.96); }
      /* Three right icon buttons: subtle glass-like default, stronger on hover */
      .icon-btn { appearance: none; -webkit-appearance: none; width: 32px; height: 32px; text-align: center; border-radius: 999px; font-size: 0; line-height: 0; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.55); border: 1px solid rgba(229,231,235,0.9); transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease; color: var(--dt-color-text-default); }
      .icon-btn:hover { background: rgba(249,250,251,0.96); border-color: rgba(209,213,219,0.95); }
      .icon-btn:active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.35); }
      .icon-btn.active { color: var(--dt-color-brand-primary); }
      .icon-btn:focus-visible,
      .screen-toggle:focus-visible,
      .input-wrap textarea:focus {
        outline: 2px solid var(--dt-color-focus-default);
        outline-offset: 2px;
      }
      #includeScreenBtn { color: var(--dt-color-text-subtle); pointer-events: auto; }
      /* Screen button (inside input): transparent, hover-only */
      .screen-toggle { appearance: none; -webkit-appearance: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; min-width: 18px; min-height: 18px; display: flex; align-items: center; justify-content: center; z-index: 10; background: transparent; border: none; transition: background 0.15s ease, opacity 0.15s ease; border-radius: 999px; }
      .screen-toggle:hover { background: rgba(255,255,255,0.4); }
      .screen-toggle:active { background: rgba(255,255,255,0.15); opacity: 0.9; }
      .screen-toggle svg { width: 10px; height: 10px; }
      .screen-attachment-chip { appearance: none; -webkit-appearance: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); height: 20px; display: none; align-items: center; gap: 4px; z-index: 11; padding: 0 6px; border-radius: 999px; background: rgba(255, 182, 35, 0.2); border: 1px solid rgba(255, 182, 35, 0.5); color: var(--dt-color-text-default); cursor: pointer; }
      .screen-attachment-chip svg { width: 11px; height: 11px; flex: 0 0 auto; }
      .screen-attachment-chip span { font-size: 11px; line-height: 1; color: rgba(17, 24, 39, 0.72); }
      .input-wrap.has-screen-attachment textarea { padding-right: 54px !important; }
      .overlay-tooltip { position: fixed; z-index: 50; max-width: 180px; padding: 4px 7px; border-radius: 6px; background: rgba(17, 24, 39, 0.94); color: #fff; font-size: 11px; line-height: 1.2; white-space: nowrap; pointer-events: none; opacity: 0; transform: translate(-50%, -100%); transition: opacity 0.1s ease; }
      .overlay-tooltip.visible { opacity: 1; }
      /* Robust centering using flex */
      .input-row { display: flex; align-items: center; gap: 6px; }
      .input-wrap { position: relative; flex: 1 1 auto; }
      .input-wrap textarea { padding-right: 28px !important; padding-top: 5px !important; padding-bottom: 5px !important; background: rgba(255,255,255,0.9) !important; border: 1px solid rgba(229,231,235,0.96) !important; border-radius: 8px; min-height: 32px; height: 32px; max-height: 32px; line-height: 18px; display: block; resize: none; overflow-y: auto; outline: none !important; text-align: left; color: var(--dt-color-text-default); font-family: var(--dt-font-body); caret-color: var(--dt-color-text-default); }
      .input-wrap textarea::placeholder,
      .input-wrap textarea::-webkit-input-placeholder { text-align: left; color: rgba(17, 24, 39, 0.58); }
      .input-wrap textarea:focus { background: rgba(255,255,255,0.96) !important; border-color: rgba(209,213,219,0.96) !important; }
      .icon-btn svg { width: 16px; height: 16px; display: block; }
      .tiny-text { font-size: 12px; }
      .text-btn { font-size: 12px; background: transparent; color: var(--dt-color-text-default); border: none; padding: 0 2px; line-height: 18px; }
      .bubble { cursor: text; max-width: 85%; border-radius: 12px; padding: 8px 10px; font-size: 12px; line-height: 1.4; -webkit-user-select: text; user-select: text; border: 1px solid transparent; }
      .bubble-user { background: rgba(255,255,255,0.97); color: var(--dt-color-text-default); border-color: rgba(229,231,235,0.94); }
      .bubble-system { background: rgba(255, 182, 35, 0.92); color: var(--dt-color-text-default); border-color: rgba(252,210,138,0.95); }
      /* Markdown styling */
      .bubble strong { font-weight: 600; }
      .bubble em { font-style: italic; }
      .bubble del { text-decoration: line-through; }
      .bubble code { background: rgba(0, 0, 0, 0.08); padding: 1px 3px; border-radius: 3px; font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; font-size: 11px; }
      .bubble pre { background: rgba(0, 0, 0, 0.08); padding: 8px 10px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
      .bubble pre code { background: transparent; padding: 0; border-radius: 0; display: block; white-space: pre; font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; font-size: 11px; }
      .bubble br { display: block; height: 4px; content: ''; }
      .bubble ul { list-style: disc; padding-left: 18px; margin: 4px 0; }
      .bubble ol { list-style: decimal; padding-left: 18px; margin: 4px 0; }
      .bubble li { margin: 2px 0; }
      .bubble a { color: var(--dt-color-brand-primary-hover); text-decoration: underline; word-break: break-all; }
.bubble a:hover { text-decoration: underline; cursor: pointer; }
      .bubble table { width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 12px; }
      .bubble th, .bubble td { border: 1px solid rgba(0,0,0,0.12); padding: 4px 6px; text-align: left; }
      .bubble thead th { background: rgba(0,0,0,0.06); font-weight: 600; }
      .bubble h1, .bubble h2, .bubble h3, .bubble h4, .bubble h5, .bubble h6 { margin: 6px 0 4px; font-weight: 600; line-height: 1.2; }
      .bubble h1 { font-size: 14px; }
      .bubble h2 { font-size: 13px; }
      .bubble h3 { font-size: 12px; }
      .bubble h4 { font-size: 12px; font-weight: 600; opacity: 0.95; }
      .bubble h5, .bubble h6 { font-size: 12px; font-weight: 600; opacity: 0.9; }
      /* Flex child must shrink so maxHeight + overflow can scroll (default min-height:auto prevents it). */
      #chatContainer { min-height: 0; cursor: default; }
      .z-chat { position: relative; z-index: 1; }
      .z-input { position: relative; z-index: 2; }
      /* Fallback visuals for non-mac non-liquid-glass overlay */
      html.non-mac.fallback-overlay .overlay-card { background: rgba(255,255,255,0.92); }
      html.non-mac.fallback-overlay .input-wrap textarea,
      html.non-mac.fallback-overlay .input-wrap textarea:focus { background: rgba(255,255,255,0.95) !important; }
      html.non-mac.fallback-overlay .input-wrap textarea { padding-right: 40px !important; }
      html.non-mac.fallback-overlay .input-wrap.has-screen-attachment textarea { padding-right: 54px !important; }
      html.non-mac.fallback-overlay .screen-toggle { right: 18px; }
    </style>
  </head>
  <body class="w-full h-full">
    <div id="overlayRoot" class="overlay-root relative w-full h-full">
        <div class="overlay-card w-full p-2 relative flex flex-col">
          <div id="mascotWrap" class="mascot-wrap no-drag" hidden aria-hidden="true">
            <div id="mascotFallback" class="mascot-fallback">
              <div class="mascot-fallback-mouth"></div>
            </div>
            <canvas id="mascotCanvas" class="mascot-canvas" hidden></canvas>
          </div>
          <div id="recentChatsContainer" class="recent-chats-container no-drag"></div>
          <div id="chatContainer" class="z-chat space-y-2 overflow-y-auto pb-2 flex-1"></div>
          <div id="chatNotice" class="chat-notice no-drag">Don can make mistakes. <button id="reportIssueBtn" class="chat-notice-link no-drag" type="button">Please report issues.</button></div>
          <div class="z-input">
            <div class="w-full flex justify-center input-row">
              <div class="input-wrap flex-1 max-w-full no-drag">
                <button id="screenAttachmentChip" class="screen-attachment-chip no-drag" type="button" title="Remove screen" aria-label="Remove screen" data-tooltip="Remove screen">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="5" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="9" y="19" width="6" height="2" rx="1" fill="currentColor"/>
                  </svg>
                  <span aria-hidden="true">x</span>
                </button>
                <button id="includeScreenBtn" class="no-drag icon-btn screen-toggle" title="Add screenshot" aria-label="Add screenshot" aria-pressed="false" data-tooltip="Add screenshot">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="5" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="9" y="19" width="6" height="2" rx="1" fill="currentColor"/>
                  </svg>
                </button>
                <textarea id="chatInput" rows="1" class="tiny-text leading-tight py-2 px-2 w-full resize-none chat-input" placeholder="" style="border-radius: 6px; -webkit-user-select: text; user-select: text;"></textarea>
              </div>
              <div class="flex items-center gap-1">
                <button id="clearBtn" class="no-drag icon-btn" title="New chat" aria-label="New chat" data-tooltip="New chat">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button id="openAppBtn" class="no-drag icon-btn" title="Open DoneThat" aria-label="Open DoneThat" data-tooltip="Open DoneThat">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12l9-9 9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5 10v10h14V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button id="closeOverlayBtn" class="no-drag icon-btn" title="Close Chat" aria-label="Close Chat" data-tooltip="Close Chat">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div id="overlayTooltip" class="overlay-tooltip" role="tooltip"></div>

    </div>

    <script src="../build/sentry-renderer.js"></script>
    <script src="./link-router.js"></script>
    <script src="../node_modules/@rive-app/canvas-single/rive.js"></script>
    <script src="./chat.js"></script>
  </body>
  </html>
