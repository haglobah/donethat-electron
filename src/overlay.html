<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" />
    <link href="../build/output.css" rel="stylesheet" />
    <link href="../styles.css" rel="stylesheet" />
    <title>Overlay</title>
    <style>
      html, body { height: 100%; }
      body { background: transparent; }
      .overlay-root { }
      .drag-region { -webkit-app-region: drag; cursor: grab; }
      .no-drag { -webkit-app-region: no-drag; }
      .overlay-card { backdrop-filter: blur(6px); background: rgba(245,245,245,0.95); box-shadow: 0 6px 18px rgba(0,0,0,0.10); border-radius: 10px; }
      .speech { position: absolute; right: 0; bottom: 60px; max-width: 220px; background: #111; color: #fff; border-radius: 8px; padding: 6px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.22); font-size: 11px; }
      .speech:after { content: ''; position: absolute; right: 10px; bottom: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid #111; }
      .icon-btn { width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 4px; font-size: 10px; }
      .tiny-text { font-size: 10px; }
      .text-btn { font-size: 10px; background: transparent; color: #111; border: none; padding: 0 2px; line-height: 16px; }
      .bubble { max-width: 85%; border-radius: 10px; padding: 6px 8px; font-size: 10px; line-height: 1.25; }
      .bubble-user { background: #ffffff; color: #111; }
      .bubble-system { background: rgba(255, 182, 35, 0.18); color: #111; }
      .z-chat { position: relative; z-index: 1; }
      .z-input { position: relative; z-index: 2; }
    </style>
  </head>
  <body class="w-[260px] h-full overflow-visible">
    <div id="overlayRoot" class="overlay-root relative w-full h-full">
      <div class="overlay-card w-full p-2 relative flex flex-col justify-center drag-region">
        <div id="chatContainer" class="z-chat space-y-1 overflow-y-auto pb-2 flex-1"></div>
        <div class="z-input">
          <div class="relative max-w-full mx-auto">
            <textarea id="chatInput" rows="1" class="no-drag tiny-text leading-tight py-2 px-2 w-full resize-none" placeholder="Ask me anything" style="background: rgba(245,245,245,0.95); border: 1px solid rgba(0,0,0,0.05); border-radius: 6px; -webkit-user-select: text; user-select: text;"></textarea>
            <div class="absolute top-2 right-1 flex items-center gap-1">
            <button id="clearBtn" class="no-drag icon-btn" title="Clear">⌫</button>
            <button id="openAppBtn" class="no-drag icon-btn" title="Open App">⌂</button>
            <button id="closeOverlayBtn" class="no-drag icon-btn" title="Close">×</button>
            </div>
          </div>
        </div>
      </div>

      
    </div>

    <script src="./overlay.js"></script>
  </body>
  </html>
