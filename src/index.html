<!DOCTYPE html>
<html lang="en" class="h-full w-full">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensure proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP Meta Tags -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.cloudfunctions.net;
    ">
    <meta http-equiv="X-Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.cloudfunctions.net;
    ">
    <title>Joey</title>
    <!-- Local Tailwind CSS -->
    <link href="../build/output.css" rel="stylesheet" />
  </head>
  <body class="bg-white h-full w-full overflow-y-auto">
    <!-- Sign In View -->
    <div id="signInView" class="view-container">
      <div class="form-container">
        <h1 class="section-header">Sign In</h1>
        <form id="signInForm" class="form-group">
          <div>
            <label for="signInEmail" class="form-label">
              Email:
            </label>
            <input
              type="email"
              id="signInEmail"
              required
              class="form-input"
            />
          </div>
          <div>
            <label for="signInPassword" class="form-label">
              Password:
            </label>
            <input
              type="password"
              id="signInPassword"
              required
              class="form-input"
            />
          </div>
          <div>
            <button
              type="submit"
              class="btn-primary"
            >
              Sign In
            </button>
          </div>
        </form>
        <div class="mt-1 flex justify-between">
          <a href="#" id="showResetPassword" class="link">
            Forgot Password?
          </a>
          <a href="#" id="showSignUp" class="link">
            Sign Up
          </a>
        </div>
      </div>
    </div>

    <!-- Sign Up View (Hidden by default) -->
    <div id="signUpView" class="view-container hidden">
      <div class="form-container">
        <h1 class="section-header">Sign Up</h1>
        <form id="signUpForm" class="form-group">
          <div>
            <label for="signUpEmail" class="form-label">
              Email:
            </label>
            <input
              type="email"
              id="signUpEmail"
              required
              class="form-input"
            />
          </div>
          <div>
            <label for="signUpPassword" class="form-label">
              Password:
            </label>
            <input
              type="password"
              id="signUpPassword"
              required
              class="form-input"
            />
          </div>
          <div>
            <button
              type="submit"
              class="btn-primary"
            >
              Sign Up
            </button>
          </div>
        </form>
        <div class="mt-1 text-center">
          <a href="#" id="backToSignIn" class="link">
            Back to Sign In
          </a>
        </div>
      </div>
    </div>

    <!-- Password Reset View (Hidden by default) -->
    <div id="resetView" class="view-container hidden">
      <div class="form-container">
        <h1 class="section-header">Reset Password</h1>
        <form id="resetForm" class="form-group">
          <div>
            <label for="resetEmail" class="form-label">
              Email:
            </label>
            <input
              type="email"
              id="resetEmail"
              required
              class="form-input"
            />
          </div>
          <div>
            <button
              type="submit"
              class="btn-primary"
            >
              Reset Password
            </button>
          </div>
        </form>
        <div class="mt-1 text-center">
          <a href="#" id="backToSignInFromReset" class="link">
            Back to Sign In
          </a>
        </div>
      </div>
    </div>
    
    <!-- Dashboard View -->
    <div id="dashboardView" class="view-container hidden">
      <div class="form-container">
        <!-- Centered header -->
        <h1 class="section-header">Done List</h1>
        
        <!-- Summary container with relative positioning for overlay -->
        <div class="relative">
          <div id="summaryContainer" class="summary-container">
            <p class="text-gray-500 text-center text-sm">
              Generate a summary to see your activities.
            </p>
          </div>
          
          <!-- Loading spinner overlay -->
          <div id="summaryLoadingSpinner" class="spinner-overlay hidden">
            <div class="spinner"></div>
          </div>
        </div>
        
        <!-- Primary action button - now below the summary container -->
        <button
          id="generateSummaryBtn"
          class="btn-primary"
        >
          Generate Summary
        </button>
        
        <!-- Save button (under summary container) -->
        <button
          id="submitSummaryBtn"
          class="btn-primary hidden"
        >
          Submit
        </button>
        
        <!-- Navigation buttons - consistent mt-8 spacing -->
        <div class="mt-1 flex justify-between items-center">
          <a href="#" id="settingsBtn" class="link">
            Settings
          </a>
          <a href="#" id="logoutLink" class="link">
            Logout
          </a>
        </div>
      </div>
    </div>
    
    <!-- Settings View -->
    <div id="settingsView" class="view-container hidden">
      <div class="form-container">
        <!-- Centered header -->
        <h1 class="section-header">Settings</h1>
        
        <!-- Settings content -->
        <div class="form-group">
          <div>
            <label for="emailInput" class="form-label mb-1">
              Recipient Emails
            </label>
            
            <!-- Email list container with relative positioning for overlay -->
            <div class="relative">
              <div id="emailTagsContainer" class="email-tags-container">
                <!-- Email tags will be added here dynamically -->
              </div>
              
              <!-- Loading spinner overlay -->
              <div id="loadingSpinner" class="spinner-overlay hidden">
                <div class="spinner"></div>
              </div>
            </div>
            
            <!-- Email input with internal plus button - fixed positioning -->
            <div class="relative w-full">
              <input
                type="email"
                id="emailInput"
                class="form-input pr-6"
                placeholder="Enter an email address"
              />
              <button
                id="addEmailBtn"
                class="absolute right-1.5 top-1/2 transform -translate-y-1/2 bg-purple-500 hover:bg-purple-600 text-white rounded-full w-4 h-4 flex items-center justify-center transition-colors"
                aria-label="Add email"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
            </div>
          </div>
        </div>
          
        <div class="mt-1 text-center">
          <a href="#" id="backToDashboardBtn" class="link">
            Back to Dashboard
          </a>
        </div>
      </div>
    </div>
    
    <!-- External script for SPA logic -->
    <script type="module" src="index.js"></script>
  </body>
</html>
