name: 'Build and Release'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26-large
            platform: mac
            arch: x64
            command: upload:mac:x64
          - os: macos-26
            platform: mac
            arch: arm64
            command: upload:mac:arm64
          - os: windows-latest
            platform: win
            arch: x64
            command: upload:win:x64
          - os: windows-11-arm
            platform: win
            arch: arm64
            command: upload:win:arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            command: upload:linux:x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            command: upload:linux:arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mask secrets
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.GH_PAT }}"
          echo "::add-mask::${{ secrets.APP_STORE_CONNECT_KEY_ID }}"
          echo "::add-mask::${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          echo "::add-mask::${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}"
          echo "::add-mask::${{ secrets.MAC_CERTIFICATE_PASSWORD }}"

      - name: Ensure release runs from main
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ] || [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases must be run from the main branch. Current ref: ${GITHUB_REF_TYPE}/${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Configure git for release tagging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          
      - name: Fix macOS active-win dependencies
        if: matrix.platform == 'mac'
        run: |
          pip install macholib
          
      - name: Install dependencies
        run: npm ci --include=optional

      - name: Set mac signing + notarization environment
        if: matrix.platform == 'mac'
        run: |
          echo "::add-mask::${{ secrets.MAC_CERTIFICATE }}"
          echo "::add-mask::${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}"

          mkdir -p "$RUNNER_TEMP/donethat"
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/donethat/asc-notary.p8"
          echo "APP_STORE_CONNECT_KEY_ID=${{ secrets.APP_STORE_CONNECT_KEY_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_ISSUER_ID=${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_PRIVATE_KEY_PATH=$RUNNER_TEMP/donethat/asc-notary.p8" >> $GITHUB_ENV

          echo "CSC_LINK=${{ secrets.MAC_CERTIFICATE }}" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
        shell: bash
          
      - name: Azure login (OIDC) for Trusted Signing
        if: matrix.platform == 'win'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Trusted Signing dlib and metadata
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = if ('${{ matrix.arch }}' -eq 'arm64') { 'arm64' } else { 'x64' }

          $nugetPath = Join-Path $env:RUNNER_TEMP 'nuget.exe'
          Invoke-WebRequest -Uri 'https://dist.nuget.org/win-x86-commandline/latest/nuget.exe' -OutFile $nugetPath

          $dlibRoot = Join-Path $env:RUNNER_TEMP 'artsign'
          New-Item -ItemType Directory -Force -Path $dlibRoot | Out-Null
          & $nugetPath install Microsoft.ArtifactSigning.Client -x -OutputDirectory $dlibRoot
          if ($LASTEXITCODE -ne 0) { throw "nuget install failed with exit code $LASTEXITCODE" }

          $dlib = Get-ChildItem -Path $dlibRoot -Recurse -Filter 'Azure.CodeSigning.Dlib.dll' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\bin\\$arch\\" } |
            Select-Object -First 1
          if (-not $dlib) { throw "Azure.CodeSigning.Dlib.dll not found for arch $arch under $dlibRoot" }
          Write-Host "dlib: $($dlib.FullName)"

          $metadata = Join-Path $env:RUNNER_TEMP 'azure-signing-metadata.json'
          @{
            Endpoint = 'https://weu.codesigning.azure.net'
            CodeSigningAccountName = 'DoneThat'
            CertificateProfileName = 'Letss'
          } | ConvertTo-Json | Set-Content -Path $metadata -Encoding UTF8
          Write-Host "metadata: $metadata"

          $sdkRoots = @('C:\Program Files (x86)\Windows Kits\10\bin', 'C:\Program Files\Windows Kits\10\bin') |
            Where-Object { Test-Path $_ }
          $signtool = $sdkRoots |
            ForEach-Object { Get-ChildItem -Path $_ -Recurse -Filter 'signtool.exe' -ErrorAction SilentlyContinue } |
            Where-Object { $_.FullName -match "\\$arch\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found for arch $arch in Windows Kits" }
          $signtoolDir = Split-Path $signtool.FullName -Parent
          Write-Host "signtool dir: $signtoolDir"

          "AZURE_SIGN_DLIB=$($dlib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_SIGN_METADATA=$metadata" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$signtoolDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build and upload
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CI: true
        run: npm run ${{ matrix.command }} 
